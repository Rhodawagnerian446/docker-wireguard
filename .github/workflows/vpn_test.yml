name: vpn_test

on: workflow_call

jobs:
  vpn_test:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        test_id: [no-env, with-env]
      fail-fast: false
    env:
      TEST_ID: ${{ matrix.test_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Test
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd
          ls -ld vpn.env.example

          sed -i \
            -e '/VPN_DNS_NAME=/s/# //' \
            -e '/VPN_CLIENT_NAME=/s/# //' \
            -e '/VPN_DNS_SRV1=/s/# //' \
            -e '/VPN_DNS_SRV2=/s/# //' \
            vpn.env.example

          set -x

          docker build -t vpn-test .

          if [ "$TEST_ID" = "with-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --env-file ./vpn.env.example \
              --restart=always \
              -v wireguard-test-data:/etc/wireguard \
              -p 51820:51820/udp \
              -d --cap-add=NET_ADMIN \
              --cap-add=SYS_MODULE \
              --device=/dev/net/tun \
              --sysctl net.ipv4.ip_forward=1 \
              vpn-test
          elif [ "$TEST_ID" = "no-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v wireguard-test-data:/etc/wireguard \
              -p 51820:51820/udp \
              -d --cap-add=NET_ADMIN \
              --cap-add=SYS_MODULE \
              --device=/dev/net/tun \
              --sysctl net.ipv4.ip_forward=1 \
              vpn-test
          fi

          sleep 30
          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"
          docker exec "$TEST_ID" ip link show wg0
          docker exec "$TEST_ID" wg show
          docker exec "$TEST_ID" iptables -nvL
          docker exec "$TEST_ID" iptables -nvL -t nat
          docker exec "$TEST_ID" iptables -nvL -t nat | grep -q '10\.7\.0\.0/24'
          docker exec "$TEST_ID" ls -ld /etc/wireguard/wg0.conf

          if [ "$TEST_ID" = "with-env" ]; then
            docker exec "$TEST_ID" ls -ld /etc/wireguard/clients/your_client_name.conf
            docker exec "$TEST_ID" grep 'vpn.example.com' \
              /etc/wireguard/clients/your_client_name.conf
            docker exec "$TEST_ID" wg_manage --showclientcfg your_client_name \
              | grep -q 'PrivateKey'
            docker exec "$TEST_ID" grep 'Endpoint = vpn.example.com:51820' \
              /etc/wireguard/clients/your_client_name.conf
            docker exec "$TEST_ID" grep 'DNS = 1.1.1.1' \
              /etc/wireguard/clients/your_client_name.conf
            docker exec "$TEST_ID" wg_manage --addclient vpnclient2
            docker exec "$TEST_ID" ls -ld /etc/wireguard/clients/vpnclient2.conf
            docker exec "$TEST_ID" wg_manage --listclients
            docker exec "$TEST_ID" wg_manage --removeclient vpnclient2 -y
          else
            docker exec "$TEST_ID" ls -ld /etc/wireguard/clients/client.conf
            docker exec "$TEST_ID" wg_manage --addclient testclient
            docker exec "$TEST_ID" ls -ld /etc/wireguard/clients/testclient.conf
            docker exec "$TEST_ID" wg_manage --listclients
          fi

          docker restart "$TEST_ID"

          sleep 15
          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"
          docker exec "$TEST_ID" ip link show wg0
          docker exec "$TEST_ID" iptables -nvL -t nat | grep -q '10\.7\.0\.0/24'

          exit 0
      - name: Clear
        if: always()
        run: |
          docker rm -f "$TEST_ID" || true
          docker volume rm wireguard-test-data || true
          docker rmi vpn-test || true